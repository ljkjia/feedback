<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生周学习反馈系统</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f7fa;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h2 {
            text-align: center;
            color: #2d4054;
            margin-bottom: 10px;
        }
        .desc {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .form-item {
            margin: 16px 0;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
            font-size: 15px;
        }
        input, select {
            width: 100%;
            padding: 11px 14px;
            font-size: 16px;
            border: 1px solid #e5e6eb;
            border-radius: 8px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #409eff;
            box-shadow: 0 0 0 3px rgba(64,158,255,0.1);
        }
        .name-op {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            transition: 0.2s;
        }
        .btn-add {
            background: #409eff;
            color: #fff;
        }
        .btn-del {
            background: #f56c6c;
            color: #fff;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .btn-generate {
            flex: 1;
            padding: 12px;
            background: #409eff;
            color: #fff;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-reset {
            flex: 1;
            padding: 12px;
            background: #909399;
            color: #fff;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-copy {
            width: 100%;
            padding: 12px;
            background: #67c23a;
            color: #fff;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            margin-bottom: 20px;
        }
        .result-box {
            padding: 20px;
            background: #f0f7ff;
            border-radius: 10px;
            line-height: 1.8;
            font-size: 15px;
            color: #333;
            display: none;
            margin-bottom: 20px;
            white-space: pre-line;
        }
        .history-title {
            font-size: 18px;
            color: #2d4054;
            margin: 30px 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-clear-all {
            background: #ff7875;
            color: #fff;
        }
        .history-item {
            padding: 15px;
            background: #f9fafc;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #409eff;
        }
        .history-head {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }
        .history-content {
            line-height: 1.7;
            font-size: 14px;
            color: #333;
            white-space: pre-line;
        }
        .history-del {
            color: #f56c6c;
            cursor: pointer;
            font-size: 14px;
        }
        .empty-tip {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>学生周学习反馈系统</h2>
        <p class="desc">固定四段格式 | 数字化作业听写 | 可增删学生</p>

        <div class="section">
            <div class="form-item">
                <label>选择学生</label>
                <select id="studentSelect"></select>
                <div class="name-op">
                    <input type="text" id="newName" placeholder="输入姓名添加到名单">
                    <button class="btn btn-add" onclick="addStudent()">添加</button>
                    <button class="btn btn-del" onclick="delStudent()">删除选中</button>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="form-item">
                <label>作业完成情况</label>
                <select id="homework">
                    <option value="优秀">优秀</option>
                    <option value="良好">良好</option>
                    <option value="一般">一般</option>
                    <option value="较差">较差</option>
                </select>
            </div>
            <div class="form-item">
                <label>听写完成情况</label>
                <select id="dictation">
                    <option value="优秀">优秀</option>
                    <option value="良好">良好</option>
                    <option value="一般">一般</option>
                    <option value="较差">较差</option>
                </select>
            </div>
            <div class="form-item">
                <label>出勤情况</label>
                <select id="attendance">
                    <option value="全勤">全勤</option>
                    <option value="偶尔迟到">偶尔迟到</option>
                    <option value="经常请假">经常请假</option>
                </select>
            </div>
            <div class="form-item">
                <label>课堂表现</label>
                <select id="performance">
                    <option value="优秀">优秀</option>
                    <option value="良好">良好</option>
                    <option value="一般">一般</option>
                    <option value="较差">较差</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-generate" onclick="createFeedback()">生成评语并保存记录</button>
            <button class="btn-reset" onclick="resetAll()">重置选项</button>
        </div>

        <div class="result-box" id="resultBox"></div>
        <button class="btn-copy" id="copyBtn" onclick="copyText()">一键复制评语</button>

        <div class="history-title">
            <span>📋 历史反馈记录</span>
            <button class="btn btn-clear-all" onclick="clearAllHistory()">清空全部记录</button>
        </div>
        <div id="historyList"></div>
    </div>

<script>
    const STUDENT_KEY = "studentList";
    const HISTORY_KEY = "feedbackHistory";
    // 预置学生名单
    const defaultStudents = ["曹粒鑫","蒋朋辰","庞昊","刘子歌","柏雯雯","刘子豪","郑雅馨","金晶煊","尹浩东"];

    let studentList = JSON.parse(localStorage.getItem(STUDENT_KEY)) || [];
    // 强制初始化预置名单
    if (!studentList || studentList.length === 0) {
        studentList = [...defaultStudents];
        localStorage.setItem(STUDENT_KEY, JSON.stringify(studentList));
    }

    // 渲染学生下拉框
    function initStudentSelect() {
        const sel = document.getElementById("studentSelect");
        sel.innerHTML = '<option value="">-- 请选择学生 --</option>';
        studentList.forEach(name => {
            const opt = document.createElement("option");
            opt.value = name;
            opt.innerText = name;
            sel.appendChild(opt);
        });
    }

    // 添加学生
    function addStudent() {
        const val = document.getElementById("newName").value.trim();
        if (!val) return alert("请输入学生姓名");
        if (studentList.includes(val)) return alert("该学生已存在");
        studentList.push(val);
        localStorage.setItem(STUDENT_KEY, JSON.stringify(studentList));
        initStudentSelect();
        document.getElementById("newName").value = "";
    }

    // 删除学生
    function delStudent() {
        const sel = document.getElementById("studentSelect");
        const name = sel.value;
        if (!name) return alert("请先选中学生");
        studentList = studentList.filter(item => item !== name);
        localStorage.setItem(STUDENT_KEY, JSON.stringify(studentList));
        initStudentSelect();
    }

    // 历史记录相关
    let historyData = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
    function renderHistory() {
        const wrap = document.getElementById("historyList");
        if (historyData.length === 0) {
            wrap.innerHTML = '<div class="empty-tip">暂无历史记录</div>';
            return;
        }
        let html = "";
        historyData.forEach((item, index) => {
            html += `
                <div class="history-item">
                    <div class="history-head">
                        <span>${item.time} | ${item.name}</span>
                        <span class="history-del" onclick="delHistory(${index})">删除本条</span>
                    </div>
                    <div class="history-content">${item.content}</div>
                </div>
            `;
        });
        wrap.innerHTML = html;
    }

    function delHistory(index) {
        historyData.splice(index, 1);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(historyData));
        renderHistory();
    }

    function clearAllHistory() {
        if (!confirm("确定清空所有记录？不可恢复！")) return;
        historyData = [];
        localStorage.setItem(HISTORY_KEY, JSON.stringify(historyData));
        renderHistory();
    }

    function addHistory(name, content) {
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
        historyData.unshift({ name, time: timeStr, content });
        localStorage.setItem(HISTORY_KEY, JSON.stringify(historyData));
        renderHistory();
    }

    // 评语模板
    const goodWords = [
`【整体情况】
本周{name}综合表现优异，学习态度端正自律，整体状态出色。

【作业与听写】
本周作业完成度100%，正确率很高；本周共听写4次，全部过关。

【出勤情况】
{attendText}

【课堂表现 & 后续建议】
课堂专注认真，积极思考发言。望继续保持，挑战更高目标。`];

    const normalWords = [
`【整体情况】
本周{name}整体表现平稳，能遵守纪律，完成基础学习任务。

【作业与听写】
本周作业完成度尚可，正确率中等；本周共听写4次，部分未过关，需加强练习。

【出勤情况】
{attendText}

【课堂表现 & 后续建议】
课堂态度端正，但主动发言较少。基础不错，多用心巩固会进步更快。`];

    const badWords = [
`【整体情况】
本周{name}学习状态较松散，表现未达要求，需及时调整。

【作业与听写】
作业完成度不足，正确率偏低；听写4次，过关次数少，基础薄弱。

【出勤情况】
{attendText}

【课堂表现 & 后续建议】
课堂注意力不集中。望端正态度，补齐短板，跟上班级进度。`];

    function getRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // 生成评语
    function createFeedback() {
        const name = document.getElementById("studentSelect").value;
        if (!name) return alert("请先选择学生");
        const hw = document.getElementById("homework").value;
        const dt = document.getElementById("dictation").value;
        const atd = document.getElementById("attendance").value;
        const pf = document.getElementById("performance").value;

        let content;
        if (hw === "优秀" && dt === "优秀" && pf === "优秀" && atd === "全勤") {
            content = getRandom(goodWords);
        } else if (hw === "较差" || dt === "较差" || pf === "较差") {
            content = getRandom(badWords);
        } else {
            content = getRandom(normalWords);
        }

        content = content.replace(/{name}/g, name).replace(/{attendText}/g, atd);
        document.getElementById("resultBox").innerText = content;
        document.getElementById("resultBox").style.display = "block";
        document.getElementById("copyBtn").style.display = "block";
        addHistory(name, content);
    }

    // 复制文本
    function copyText() {
        const text = document.getElementById("resultBox").innerText;
        navigator.clipboard.writeText(text).then(() => alert("复制成功！"));
    }

    // 重置选项
    function resetAll() {
        document.getElementById("studentSelect").selectedIndex = 0;
        document.getElementById("homework").selectedIndex = 0;
        document.getElementById("dictation").selectedIndex = 0;
        document.getElementById("attendance").selectedIndex = 0;
        document.getElementById("performance").selectedIndex = 0;
        document.getElementById("resultBox").style.display = "none";
        document.getElementById("copyBtn").style.display = "none";
    }

    // 页面加载完成执行
    window.onload = function () {
        initStudentSelect();
        renderHistory();
    };
</script>
</body>
</html>
